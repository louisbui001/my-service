# .github/workflows/ci.yml
# CI Pipeline: Build → Scan → Push Image
# =========================================
# Vai trò: Build artifact duy nhất, không deploy
# Output: Docker image với immutable tag
# =========================================

name: CI — Build & Push Image

on:
  push:
    branches:
      - uat
      - hotfix/**
      - main
  pull_request:
    branches:
      - uat
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ví dụ: myorg/my-service

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: SAST Security Scan (Coverity)
  # Giữ nguyên từ flow hiện tại, không thay đổi
  # ─────────────────────────────────────────────
  sast-scan:
    name: Security Scan (Coverity SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Coverity SAST Scan
        # Thay bằng action Coverity thực của tổ chức
        run: |
          echo "Running Coverity SAST scan..."
          # coverity capture --dir cov-int
          # coverity analyze --dir cov-int
          # coverity commit-defects --dir cov-int \
          #   --host ${{ secrets.COVERITY_HOST }} \
          #   --stream my-service-uat \
          #   --auth-key-file coverity-auth.key

      - name: Check SAST results
        run: |
          echo "Checking for HIGH/CRITICAL findings..."
          # Nếu có HIGH → exit 1 → notify Tech Lead, pipeline stop
          # Nếu không có → continue

      - name: Notify Tech Lead on SAST failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *SAST SCAN FAILED*\n*Service:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Author:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_TECH_LEAD_WEBHOOK }}

  # ─────────────────────────────────────────────
  # JOB 2: Unit Tests
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: sast-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup language runtime
        # Ví dụ cho Java/Maven — thay theo tech stack thực
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run unit tests
        run: |
          # mvn test (Java)
          # npm test (Node.js)
          # pytest (Python)
          echo "Running unit tests..."

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/   # thay theo tech stack

  # ─────────────────────────────────────────────
  # JOB 3: Build & Push Docker Image
  # Chỉ chạy khi merge vào uat/main (không chạy trên PR)
  # ─────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [sast-scan, unit-tests]
    if: github.event_name == 'push'   # Chỉ build khi push, không build trên PR
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image version tag
        id: version
        run: |
          # Tag format: v{semantic_version}-{short_commit_sha}
          # Ví dụ: v1.2.3-abc1234
          # Đây là immutable identifier — build một lần, deploy nhiều nơi
          COMMIT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          # Lấy version từ file (ví dụ: package.json, pom.xml, version.txt)
          APP_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          VERSION="v${APP_VERSION}-${COMMIT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Image version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag chính: v1.2.3-abc1234 (immutable, dùng cho deploy)
            type=raw,value=${{ steps.version.outputs.version }}
            # Tag latest cho branch (human-readable)
            type=raw,value=latest-${{ github.ref_name }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build arguments nếu cần
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Notify CI success — Image ready for CD
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🏗️ *CI BUILD THÀNH CÔNG — Image sẵn sàng cho CD*\n*Service:* ${{ github.repository }}\n*Version:* ${{ steps.version.outputs.version }}\n*Branch:* ${{ github.ref_name }}\n*Author:* ${{ github.actor }}\n⏳ Spinnaker sẽ tự động deploy lên DEV..."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}