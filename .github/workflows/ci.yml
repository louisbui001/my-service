# .github/workflows/ci.yml
# CI Pipeline: Build → Scan → Push Image
# =========================================
# Vai trò: Build artifact duy nhất, không deploy
# Output: Docker image với immutable tag
# =========================================

name: CI — Build & Push Image

on:
  push:
    branches:
      - dev
      - hotfix/**
      - master
  pull_request:
    branches:
      - dev
      - master

env:
  REGISTRY: docker.io
  IMAGE_NAME: louisbui/dev

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: SAST Security Scan
  # npm audit (dependency CVEs) + CodeQL (code analysis)
  # ─────────────────────────────────────────────
  sast-scan:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability scan (npm audit)
        run: npm audit --audit-level=high

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      - name: Notify Tech Lead on SAST failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *SAST SCAN FAILED*\n*Service:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Author:* ${{ github.actor }}\n*Details:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_TECH_LEAD_WEBHOOK }}

  # ─────────────────────────────────────────────
  # JOB 2: Unit Tests
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: sast-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  # ─────────────────────────────────────────────
  # JOB 3: Build & Push Docker Image
  # Chỉ chạy khi merge vào dev/master (không chạy trên PR)
  # ─────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [sast-scan, unit-tests]
    if: github.event_name == 'push'   # Chỉ build khi push, không build trên PR
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image version tag
        id: version
        run: |
          # Tag format: v{semantic_version}-{short_commit_sha}
          # Ví dụ: v1.2.3-abc1234
          # Đây là immutable identifier — build một lần, deploy nhiều nơi
          COMMIT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          # Lấy version từ file (ví dụ: package.json, pom.xml, version.txt)
          APP_VERSION=$(cat VERSION 2>/dev/null || echo "1.0.0")
          VERSION="v${APP_VERSION}-${COMMIT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Image version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag chính: v1.2.3-abc1234 (immutable, dùng cho deploy)
            type=raw,value=${{ steps.version.outputs.version }}
            # Tag latest cho branch (human-readable)
            type=raw,value=latest-${{ github.ref_name }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build arguments nếu cần
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Notify CI success — Image ready for CD
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🏗️ *CI BUILD THÀNH CÔNG — Image sẵn sàng cho CD*\n*Service:* ${{ github.repository }}\n*Version:* ${{ steps.version.outputs.version }}\n*Branch:* ${{ github.ref_name }}\n*Author:* ${{ github.actor }}\n⏳ Spinnaker sẽ tự động deploy lên DEV..."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}